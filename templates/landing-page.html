<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>锐捷 · 文档中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:linear-gradient(135deg,#0d47a1 0%,#1565c0 50%,#1976d2 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;color:#fff;
}
.card{max-width:420px;width:100%;text-align:center}
.card h1{font-size:22px;font-weight:700;margin-bottom:6px}
.card p{font-size:13px;opacity:.7;margin-bottom:24px}
.links{display:flex;flex-direction:column;gap:12px}
.links a{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.12);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.2);border-radius:12px;
  padding:16px 18px;text-decoration:none;color:#fff;transition:.2s;
}
.links a:hover{background:rgba(255,255,255,.2);transform:translateY(-1px)}
.links a .left{text-align:left}
.links a .left .title{font-size:15px;font-weight:600}
.links a .left .desc{font-size:12px;opacity:.6;margin-top:2px}
.links a .arrow{font-size:18px;opacity:.5}
.tag{
  display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;
  background:rgba(255,255,255,.15);margin-left:6px;vertical-align:middle;
}
.footer{margin-top:20px;font-size:11px;opacity:.4}
</style>
</head>
<body>
<div class="card">
  <h1>📋 锐捷 · 文档中心</h1>
  <p>内部资料 · 手机端已适配</p>
  <div class="links">
    <a href="compare.html">
      <div class="left">
        <div class="title">锐捷 vs 海康 · 功能对比 <span class="tag">347项</span></div>
        <div class="desc">reyee 软件需求分析 · 在线手册版</div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a href="tasks.html">
      <div class="left">
        <div class="title">网通专代开拓 · 任务跟踪 <span class="tag">14项</span></div>
        <div class="desc">任务跟踪表 · 更新至 2026-04-26</div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>
  <div class="footer">数据来源: 本地 Excel 文件 · 拖拽文件夹到 Netlify Drop 部署</div>
</div>
</body>
</html>
